<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator | Roshan Dev Hub</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a class="brand" href="../index.html"><span class="brand-mark">RD</span><span>Roshan Dev Hub</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">Menu</button>
      <div class="nav-links"><a href="../index.html">Home</a><a href="../blog/index.html">Blog</a><a href="index.html">Apps</a><a href="../index.html#contact">Contact</a><button class="theme-toggle" type="button">Theme</button></div>
    </nav>
  </header>
  <main class="tool-shell container">
    <section class="tool-panel reveal">
      <p class="eyebrow">Mini app</p>
      <h1>Calculator</h1>
      <p>Tap the keys to build an expression.</p>
      <div class="calculator-display" data-calculator-display>0</div>
      <div class="calculator-grid" aria-label="Calculator keys">
        <button data-calculator-key="clear">C</button><button data-calculator-key="backspace">DEL</button><button data-calculator-key="%">%</button><button data-calculator-key="/">/</button>
        <button data-calculator-key="7">7</button><button data-calculator-key="8">8</button><button data-calculator-key="9">9</button><button data-calculator-key="*">*</button>
        <button data-calculator-key="4">4</button><button data-calculator-key="5">5</button><button data-calculator-key="6">6</button><button data-calculator-key="-">-</button>
        <button data-calculator-key="1">1</button><button data-calculator-key="2">2</button><button data-calculator-key="3">3</button><button data-calculator-key="+">+</button>
        <button data-calculator-key="0">0</button><button data-calculator-key=".">.</button><button data-calculator-key="(">(</button><button data-calculator-key=")">)</button>
        <button class="app-button primary" data-calculator-key="=">=</button>
      </div>
      <div class="app-actions"><a class="button secondary" href="index.html">Back to apps</a></div>
    </section>
  </main>
  <script src="../script.js"></script>
</body>
</html>
