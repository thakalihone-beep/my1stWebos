<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator | Roshan Dev Hub</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Main navigation">
      <a class="brand" href="../index.html"><span class="brand-mark">RD</span><span>Roshan Dev Hub</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">Menu</button>
      <div class="nav-links"><a href="../index.html">Home</a><a href="../blog/index.html">Blog</a><a href="index.html">Apps</a><a href="../index.html#contact">Contact</a><button class="theme-toggle" type="button">Theme</button></div>
    </nav>
  </header>
  <main class="tool-shell container">
    <section class="tool-panel reveal">
      <p class="eyebrow">Mini app</p>
      <h1>Password Generator</h1>
      <p class="password-output" data-password-output>Click generate</p>
      <div class="field-grid">
        <label for="passwordLength">Length
          <input id="passwordLength" type="number" min="6" max="32" value="14" data-password-length>
        </label>
        <div class="option-grid">
          <label class="check-row"><input type="checkbox" checked data-password-set="lower"> Lowercase</label>
          <label class="check-row"><input type="checkbox" checked data-password-set="upper"> Uppercase</label>
          <label class="check-row"><input type="checkbox" checked data-password-set="numbers"> Numbers</label>
          <label class="check-row"><input type="checkbox" checked data-password-set="symbols"> Symbols</label>
        </div>
      </div>
      <div class="app-actions">
        <button class="app-button primary" type="button" data-password-generate>Generate</button>
        <button class="app-button secondary" type="button" data-password-copy>Copy</button>
        <a class="button secondary" href="index.html">Back to apps</a>
      </div>
    </section>
  </main>
  <script src="../main.js"></script>
  <script src="password.js"></script>
</body>
</html>
